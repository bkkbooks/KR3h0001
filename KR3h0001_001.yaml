body:
  text: 第一品五人陸探微窮理盡性事絶言象包前孕後古今獨立非復激揚所能稱贊但價重之極於上上品之外無他寄言故屈標第一等曹不興不興之迹殆莫復傳唯祕閣之內一龍而已觀其風骨名豈虛成衛協古畫之略至協始精六法之中逮為兼善雖不該備形妙頗得壯氣凌跨群雄曠代絶筆張墨荀勗風範氣候極妙參神但取精靈遺其骨法若拘以體物則未見精粹若取之象外方厭膏腴可謂微妙也顧駿之神韻氣力不逮前賢精微謹細有過往哲始變古則今賦彩製形皆創新意若包犧始更卦體史籀初改書法嘗結搆層樓以為畫所風雨炎奧之時故不操筆天和氣爽之日方乃染毫登樓去梯妻子罕見畫蟬雀駿之始也宋大明中天下莫敢競矣陸綏體韻遒舉風彩飄然一點一拂動筆皆奇傳世蓋少所謂希見卷軸故為寶也袁蒨此方陸氏最為高逸象人之妙亞美前賢但志守師法更無新意然和璧微玷豈貶十城之價也姚曇度畫有逸方巧變峰出魁神鬼皆能絶妙同流真為雅鄭兼善莫不俊拔出人意表天挺生知非學所及雖纖微長短往往失之而輿皂之中莫與為匹豈直楝梁蕭艾可唐搜璵璠者哉顧愷之格體精微筆無妄下但跡不逮意聲過其實毛惠遠畫體周贍無適弗該出入窮奇縱橫逸筆力遒韻雅超邁絶倫其揮霍必也極妙至於定質塊然未盡其善神鬼及馬泥滯於體頗有拙也夏瞻雖氣力不足而精彩有餘擅名遠代事非虛美戴逵情韻連綿風趣巧拔善圖賢聖百工所範荀衛已後實為領袖及乎子顒能繼其美江僧寶斟酌袁陸親漸朱藍用筆骨梗甚有師法像人之外非其所長也吳暕畫法雅媚製置才巧擅美當年有聲京洛張則意思橫逸動筆新奇師心獨見鄙於綜採變巧不竭若環之無端景多觸目謝題徐落云此二人後不得預焉陸泉體致不凡跨邁流俗時有合作往往出入點畫之間動流恢服傳於後者殆不盈握桂枝一芳足懯本性流液之素難效其功蘧道愍章繼伯並善寺壁兼長畫扇人馬分數毫釐不失別體之妙亦為入神顧寶先全法陸家事事宗稟方之袁蒨可謂小巫王微史道碩並師荀衛各體善能然王得其細史傳其真細而論之景玄為劣劉頊用意綿密畫體纖細而筆跡困弱形製單省其於所長婦人為最但纖細過度翻更失真然觀察詳審甚得恣態晉明帝雖略於形色頗得神氣筆迹超越亦有奇觀劉紹祖善於傳寫不間其思至於雀鼠筆跡歷落往往出群時人為之語號曰移畫然迷而不作非畫所先宋炳炳明於六法迄無適善而含毫命素必有損益跡非準的意足師放丁光雖擅色蟬雀而筆跡輕羸非不精謹乏於生氣
