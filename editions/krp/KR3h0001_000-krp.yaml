body:
  text: 提要古畫品録藝術類一書畫之屬臣等謹案古畫品録南齊謝赫撰凡一卷等差畫家之優劣分為六品晁氏讀書志謂分四品者誤也大抵謂畫有六法兼善者難自陸探微以下以次品第各為序引其意頗矜慎得二十七人陳姚最嘗譏其未允謂如長康之美擅髙往筞矯然獨步終始無雙列於下品尤所未安李嗣真亦譏其黜衛進曺有涉貴耳之論然所言六法畫家宗之至今實千載不能易也書品藝術類一書畫之屬臣等謹案書品一卷梁庾肩吾撰肩吾字子慎新野人起家晉安王國常侍元帝時官至度支尚書事蹟具梁書文學𫝊是書載漢至齊梁能真草者一百二十八人分為九品毎品各繫以論而以總序冠于前考竇臮述書賦稱肩吾通塞并乏天性工歸文華拙見草正徒聞師阮何至遼夐使鉛刀之均鋒稱並利而則佞云云其于肩吾書學不甚推許又其論述作一條稱庾中庶品格拘于文華則于是書亦頗致不滿然其論列多有理致究不失先民典型如序稱𨽻體發源秦時𨽻人下邽程邈所作始皇見而重之以奏事繁多篆字難製遂作此法故曰𨽻書今時正書是也此足證歐陽修以八分為𨽻之誤惟唐之魏徵與肩吾時代邈不相及而並列其間殊為顛舛故王士禎居易録詆毛晉刋板之訛又序稱一百二十八人而書中所列實止一百二十三人數亦不符殆後人已有所増削然張彦逺法書要録全載此書已同此本併魏徵之謬亦同則其米久矣續畫品藝術類一書畫之屬臣等謹案續畫品一卷舊本題陳吴興姚最撰今考書中稱梁元帝為湘東殿下則作是書時猶在江陵即位之前盖梁人而入陳者猶玉臺新咏作於梁簡文在東宫時而今本皆題陳徐陵耳其書繼謝赫古畫品而作而以赫所品髙下多失其實故但叙時代不分品目所録始於梁元帝終於解蒨凡二十人各為論斷中嵇寶鈞聶松合一論釋僧珍僧覺合一論釋迦佛陀吉底俱摩羅菩提合一論凡為論十六則名下間有附注如湘東殿下條注曰梁元帝初封湘東王嘗畫芙蓉圗醮鼎圗毛棱條下注曰恵秀姪尚似是最之本文至張僧繇條下注曰五代梁時吴興人則决不出最手盖皆後人所益也凡所論斷多不過五六行少或止於三四句而出以儷詞氣體雅雋確為唐以前語非後人所能依託也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書古畫品録南齊謝赫撰夫畫品者蓋衆畫之優劣也圖繪者莫不明勸戒著升沈千載寂寥披圖可鑒雖畫有六法罕能盡該而自古及今各善一節六法者何一氣韻生動是也二骨法用筆是也三應物象形是也四隨類賦彩是也五經營位置是也六傳移模寫是也唯陸探微衞協備該之矣然迹有巧拙藝無古今謹依遠近隨其品第裁成序引故此所述不廣其源但傳出自神仙莫之聞見也第一品五人陸探微事五代宋明帝吳人窮理盡性事絶言象包前孕後古今獨立非復激揚所能稱贊但價重之極乎上上品之外無他寄言故屈標第一等曹不興五代吳時事孫權吳興人不興之迹殆莫復傳唯秘閣之内一龍而已觀其風骨名豈虚成衞協五代晉時占畫之畧至協始精六法之中迨為兼善雖不説備形妙頗得壯氣陵跨羣雄曠代絶筆張墨荀朂風範氣候極妙參神但取精靈遺其骨法若拘以體物則未見精粹若取之象外方厭髙腴可謂微妙也第二品三人顧駿之神韻氣力不逮前賢精微謹細有過徃哲始變古則今賦彩製形皆創新意若包犧始更卦體史籀初改書法常結搆層樓以為畫所風雨炎燠之時故不操筆天和氣爽之日方乃染毫登樓去梯妻子罕見畫蟬雀駿之始也宋大明中天下莫敢競矣陸綏體韻遒舉風彩飄然一㸃一拂動筆皆竒傳世蓋少所謂希見卷軸故為寶也袁蒨比方陸氏最為髙逸象人之妙亞美前賢但志守師法更無新意雖和璧微玷豈貶十城之價也第三品九人姚曇度畫有逸方巧變鋒出􅀈魁神鬼皆能絶妙竒正咸宜雅鄭兼善莫不俊㧞出人意表天挺生知非學所及雖纎微長短徃徃失之而輿皁之中莫與為匹豈直棟梁蕭艾可搪揬璵璠者哉顧愷之五代晉時晉陵無錫人字長康小字虎頭除體精微筆無妄下但跡不逮意聲過其實毛惠遠畫體周贍無適弗該出入窮竒縱横逸筆力遒韻雅超邁絶倫其揮霍必也極妙至於定質塊然未盡其善神鬼及馬泥滯於體頗有拙也夏曕雖氣力不足而精彩有餘擅名遠代事非虛矣戴逵情韻連綿風趣巧拔善圖賢聖百工所範荀衞已後實為領袖及乎子顒能繼其美江僧寶斟酌袁陸親漸朱藍用筆骨梗甚有師法像人之外非其所長也吳暕體法雅媚製置才巧擅美當年有聲京洛張則意思横逸動筆新竒師心獨見鄙於綜採變巧不竭若環之無端景多觸目謝題徐落云此二人後不得預焉陸杲體致不凡跨邁流俗時有合作徃徃出人㸃畫之間動流恢復傳於後者殆不盈握桂枝一芳足徴本性流液之素難効其功第四品五人蘧道愍章繼伯竝善寺壁兼長畫扇人馬分數毫釐不失别體之妙亦為入神顧寶先全法陸家事之宗稟方之袁蒨可謂小巫王微史道碩五代晉時竝師荀衞各體善能然王得其細史傳其真細而論之景𤣥為劣第五品三人劉頊用意綿宻畫體簡細而筆跡困弱形製單省其於所長婦人為最但纎細過度翻更失真然觀察詳審甚得姿態晉明帝諱紹元帝長子師王廙雖畧於形色頗得神氣筆跡超越亦有竒觀劉紹祖善於傳寫不閑其思至於雀鼠筆迹歴落徃徃出羣時人為之語號曰移畫然述而不作非畫所先第六品二人宋炳炳明於六法迄無適善而含毫命素必有損益跡非凖的意足師倣丁光雖擅名蟬雀而筆跡輕羸非不精謹乏於生氣古畫品録
